<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mintal AI - 智能助手</title>
    <link rel="icon" href="/favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              // Ensure Nunito is the primary font to match Sidebar Title
              sans: ['"Nunito"', '"Noto Sans SC"', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
            },
            colors: {
              // Creamy Light Mode Palette (unchanged)
              cream: {
                50: '#FFFCF5',
                100: '#FFF9E6',
                200: '#FFF0C2',
                300: '#FFE08A',
              },
              cheese: {
                100: '#FFF4E0',
                200: '#FFE0B2',
                300: '#FFCC80',
                400: '#FFB74D',
                500: '#FFA726',
                600: '#FB8C00',
              },
              warm: {
                500: '#A1887F',
                600: '#795548',
                700: '#5D4037',
                800: '#4E342E',
                900: '#3E2723',
              },
              // Dreamy Dark Mode Palette (Refined)
              night: {
                bg: '#0B0F19', // Deeper blue/black
                card: '#151b2e', // Slightly lighter blue
                surface: '#1e293b',
              },
              starlight: {
                100: '#E0F2FE',
                200: '#BAE6FD',
                300: '#7DD3FC',
                400: '#38BDF8',
                500: '#0EA5E9', // Sky blue for primary actions
                600: '#0284C7',
                glow: 'rgba(14, 165, 233, 0.5)',
              }
            },
            transitionTimingFunction: {
              // Snappier spring curve with a softer, tighter rebound.
              'spring': 'cubic-bezier(0.24, 0.92, 0.32, 1.02)',
              'soft': 'cubic-bezier(0.22, 1, 0.36, 1)',
            },
            animation: {
              'pop-in': 'popIn 0.26s cubic-bezier(0.22, 1, 0.36, 1) both',
              'slide-up-bouncy': 'slideUpBouncy 0.3s cubic-bezier(0.24, 0.92, 0.32, 1.02) both',
              'bounce-soft': 'bounceSoft 2.2s ease-in-out infinite',
              'float': 'float 6s ease-in-out infinite',
              'scale-click': 'scaleClick 0.08s ease-out',
              'twinkle': 'twinkle 3.2s ease-in-out infinite',
              'jelly': 'jelly 0.3s cubic-bezier(0.22, 1, 0.36, 1) both',
              'wiggle': 'wiggle 0.9s ease-in-out infinite',
              'soft-reveal': 'softReveal 0.24s cubic-bezier(0.22, 1, 0.36, 1) both',
            },
            keyframes: {
              popIn: {
                '0%': { opacity: '0', transform: 'scale(0.992) translateY(4px)' },
                '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
              },
              slideUpBouncy: {
                '0%': { opacity: '0', transform: 'translateY(10px) scale(0.992)' },
                '60%': { opacity: '1', transform: 'translateY(-1px) scale(1.002)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              bounceSoft: {
                '0%, 100%': { transform: 'translateY(-1.5%)' },
                '50%': { transform: 'translateY(0)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                '50%': { transform: 'translateY(-4px) rotate(0.5deg)' },
              },
              scaleClick: {
                '0%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(0.97)' },
                '100%': { transform: 'scale(1)' },
              },
              twinkle: {
                '0%, 100%': { opacity: '0.35', transform: 'scale(0.92)' },
                '50%': { opacity: '1', transform: 'scale(1.08)' },
              },
              jelly: {
                '0%': { transform: 'scale(1, 1)' },
                '30%': { transform: 'scale(1.018, 0.988)' },
                '50%': { transform: 'scale(0.995, 1.005)' },
                '70%': { transform: 'scale(1.005, 0.997)' },
                '100%': { transform: 'scale(1, 1)' },
              },
              wiggle: {
                '0%, 100%': { transform: 'rotate(-0.8deg)' },
                '50%': { transform: 'rotate(0.8deg)' },
              },
              softReveal: {
                '0%': { opacity: '0', transform: 'translateY(6px) scale(0.985)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              }
            },
            boxShadow: {
              'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
              'cheese': '0 10px 25px -5px rgba(255, 167, 38, 0.4)',
              'cheese-sm': '0 4px 10px -2px rgba(255, 167, 38, 0.3)',
              'night': '0 10px 30px -10px rgba(0,0,0,0.5)',
              'glow': '0 0 25px rgba(14, 165, 233, 0.4)',
            }
          },
        },
      }
    </script>
    <style>
      html, body {
        height: 100%;
        overflow: hidden;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(200, 200, 200, 0.3);
        border-radius: 10px;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(200, 200, 200, 0.5);
      }
      .dark ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
      }

      body {
        -webkit-font-smoothing: antialiased;
        font-family: 'Nunito', 'Noto Sans SC', system-ui, sans-serif; /* Explicitly set body font */
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      ::selection {
        background: #FFE0B2;
        color: #5D4037;
      }
      .dark ::selection {
        background: #0ea5e9;
        color: white;
      }

      /* Custom utility for stars */
      .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        filter: blur(0.5px);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "path": "https://esm.sh/path@^0.12.7",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-cream-50 dark:bg-night-bg text-warm-800 dark:text-starlight-100 antialiased transition-colors duration-300">
    <div id="root" class="h-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
